<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喫茶ことほぎ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fffaf6;
  color: #333;
}

/* ロゴ */
.logo {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 120px;
  z-index: 10;
}

/* ナビ */
nav {
  position: fixed;
  top: 50%;
  left: 20px;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 12px;
}

nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

nav li {
  margin-bottom: 10px;
}

nav a {
  text-decoration: none;
  color: #333;
  transition: 0.3s;
}

nav a:hover {
  opacity: 0.6;
}

/* メイン */
main {
  margin-left: 200px;
}

/* KV */
.kv {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* セクション */
section {
  padding: 80px 40px;
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- ロゴ -->
<img src="images/logo.png" class="logo">

<!-- ナビ -->
<nav>
  <ul>
    <li><a href="index.html">TOP</a></li>
    <li><a href="menu.html">フード</a></li>
    <li><a href="goods.html">グッズ</a></li>
    <li><a href="event.html">イベント</a></li>
    <li><a href="#">M3特設</a></li>
  </ul>
</nav>

<!-- メイン -->
<main>

  <!-- KV -->
  <img src="images/kv.png" class="kv">

  <!-- テキスト -->
  <section>
    <h1>喫茶ことほぎ</h1>
    <p>いらっしゃいませ！『喫茶ことほぎ』へようこそ！</p>
    <p>開催期間：〇月〇日〜〇月〇日</p>
  </section>

</main>

<script>
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      section.classList.add("show");
    }
  });
});
</script>

</body>
</html>
