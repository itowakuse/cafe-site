<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喫茶ことほぎ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f6efe7;
  color: #333;
}

/* 左パネル */
nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;

  background: rgba(50, 30, 20, 0.75);
  backdrop-filter: blur(10px);

  padding: 30px;

  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ロゴ */
.logo {
  width: 120px;
  margin-bottom: 40px;
}

/* メニュー */
nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

nav li {
  margin-bottom: 15px;
}

nav a {
  text-decoration: none;
  color: #fff;
  transition: 0.3s;
}

nav a:hover {
  opacity: 0.6;
  letter-spacing: 1px;
}

/* アクセス（パネル内） */
.access {
  position: absolute;
  bottom: 20px;
  left: 30px;
  right: 30px;

  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  color: #fff;
}

/* メイン */
main {
  margin-left: 260px;
}

/* KV共通 */
.kv {
  height: 100vh;
}

/* PC */
.kv-pc {
  display: block;
  width: calc(100% - 260px);
  object-fit: cover;
}

/* スマホ */
.kv-sp {
  display: none;
  width: calc(100% - 260px);
  object-fit: cover;
}

/* スマホ切り替え */
@media (max-width: 768px) {

  nav {
    width: 100%;
    height: auto;
    position: relative;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  main {
    margin-left: 0;
  }

  .kv-pc {
    display: none;
  }

  .kv-sp {
    display: block;
    width: 100%;
  }

  .access {
    position: static;
    margin-top: 20px;
  }
}
</style>
</head>

<body>

<!-- 左パネル -->
<nav>
  <div>
    <img src="logo.png" class="logo">

    <ul>
      <li><a href="index.html">TOP</a></li>
      <li><a href="menu.html">フード</a></li>
      <li><a href="goods.html">グッズ</a></li>
      <li><a href="event.html">イベント</a></li>
      <li><a href="#">M3特設</a></li>
    </ul>
  </div>

  <div class="access">
    <strong>◆アクセス</strong><br>
    Riverbed in Otherworld<br>
    <a href="https://google.com/maps/place/オレンジペコ/@35.740634,139.744645,17z/data=!4m6!3m5!1s0x60188d9034945435:0x81edcc2d2bc92e49!8m2!3d35.7406255!4d139.7446361!16s%2Fg%2F1tgpn0bn" target="_blank" style="color:#fff;">
      地図はこちら
    </a><br>
    JR山手線 駒込駅 北口より徒歩10分
  </div>
</nav>

<!-- メイン -->
<main>

  <!-- KV -->
  <img src="kv_pc.png" class="kv kv-pc">
  <img src="kv_sp.png" class="kv kv-sp">

</main>

</body>
</html>
