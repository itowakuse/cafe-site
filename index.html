<title>喫茶ことほぎ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f6efe7;
  color: #333;
}

/* 左パネル */
nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;

  background: rgba(50, 30, 20, 0.75);
  backdrop-filter: blur(10px);

  padding: 30px;

  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ロゴ */
.logo {
  width: 120px;
  margin-bottom: 40px;
}

/* メニュー */
nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

nav li {
  margin-bottom: 15px;
}

nav a {
  text-decoration: none;
  color: #fff;
  transition: 0.3s;
}

nav a:hover {
  opacity: 0.6;
  letter-spacing: 1px;
}

/* アクセス（パネル内） */
.access {
  position: absolute;
  bottom: 20px;
  left: 30px;
  right: 30px;

  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  color: #fff;
}

/* メイン */
main {
  margin-left: 260px;
}

/* KV共通 */
.kv {
  height: 100vh;
}

/* PC */

  width: calc(100% - 260px);

}
